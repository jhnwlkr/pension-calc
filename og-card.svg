<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1a2f52"/>
    </linearGradient>
    <!-- Icon bar gradients -->
    <linearGradient id="b1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.45"/>
    </linearGradient>
    <linearGradient id="b2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0.45"/>
    </linearGradient>
    <linearGradient id="b3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0.45"/>
    </linearGradient>
    <linearGradient id="b4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.45"/>
    </linearGradient>
    <!-- Glow filter for trend line -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Soft glow behind icon -->
    <radialGradient id="iconGlow" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="7" height="630" fill="#3b82f6"/>

  <!-- ═══════════ LEFT PANEL ═══════════ -->

  <!-- Domain / eyebrow -->
  <text x="52" y="88"
    font-family="ui-sans-serif, 'Helvetica Neue', Arial, sans-serif"
    font-size="16" font-weight="600" fill="#475569" letter-spacing="3.5">RETIRECALC.UK</text>

  <!-- Main headline — two lines -->
  <text x="52" y="210"
    font-family="ui-sans-serif, 'Helvetica Neue', Arial, sans-serif"
    font-size="80" font-weight="800" fill="#f1f5f9" letter-spacing="-2">UK Retirement</text>
  <text x="52" y="306"
    font-family="ui-sans-serif, 'Helvetica Neue', Arial, sans-serif"
    font-size="80" font-weight="800" fill="#60a5fa" letter-spacing="-2">Calculator</text>

  <!-- Sub-tagline -->
  <text x="52" y="356"
    font-family="ui-sans-serif, 'Helvetica Neue', Arial, sans-serif"
    font-size="21" fill="#64748b">Monte Carlo · UK Tax · 125 years of data</text>

  <!-- Feature pills — uniform 32px height, consistent padding -->
  <!-- Pill 1: Monte Carlo -->
  <rect x="52" y="394" width="158" height="32" rx="16" fill="#172554"/>
  <text x="131" y="415"
    font-family="ui-sans-serif, 'Helvetica Neue', Arial, sans-serif"
    font-size="14" font-weight="600" fill="#93c5fd" text-anchor="middle">Monte Carlo</text>

  <!-- Pill 2: Historical Returns -->
  <rect x="222" y="394" width="182" height="32" rx="16" fill="#172554"/>
  <text x="313" y="415"
    font-family="ui-sans-serif, 'Helvetica Neue', Arial, sans-serif"
    font-size="14" font-weight="600" fill="#93c5fd" text-anchor="middle">Historical Returns</text>

  <!-- Pill 3: UK Tax Model -->
  <rect x="52" y="438" width="158" height="32" rx="16" fill="#172554"/>
  <text x="131" y="459"
    font-family="ui-sans-serif, 'Helvetica Neue', Arial, sans-serif"
    font-size="14" font-weight="600" fill="#93c5fd" text-anchor="middle">UK Tax Model</text>

  <!-- Pill 4: Guyton-Klinger -->
  <rect x="222" y="438" width="182" height="32" rx="16" fill="#172554"/>
  <text x="313" y="459"
    font-family="ui-sans-serif, 'Helvetica Neue', Arial, sans-serif"
    font-size="14" font-weight="600" fill="#93c5fd" text-anchor="middle">Guyton-Klinger</text>

  <!-- Free badge -->
  <rect x="52" y="494" width="62" height="28" rx="14" fill="#14532d"/>
  <text x="83" y="513"
    font-family="ui-sans-serif, 'Helvetica Neue', Arial, sans-serif"
    font-size="13" font-weight="700" fill="#86efac" text-anchor="middle">Free</text>

  <!-- Open source badge -->
  <rect x="126" y="494" width="102" height="28" rx="14" fill="#1e293b"/>
  <text x="177" y="513"
    font-family="ui-sans-serif, 'Helvetica Neue', Arial, sans-serif"
    font-size="13" font-weight="600" fill="#94a3b8" text-anchor="middle">Open source</text>

  <!-- Disclaimer -->
  <text x="52" y="582"
    font-family="ui-sans-serif, 'Helvetica Neue', Arial, sans-serif"
    font-size="14" fill="#334155">Not financial advice &#183; Not FCA regulated</text>

  <!-- ═══════════ RIGHT PANEL: scaled favicon icon ═══════════ -->

  <!-- Soft glow wash behind icon -->
  <ellipse cx="915" cy="345" rx="230" ry="210" fill="url(#iconGlow)"/>

  <!-- Icon group: scaled up ~8× from 44px original, centred at ~915,340 -->
  <!-- Scale factor: 8.5 → each unit = 8.5px. Origin shift: cx - 22*8.5 = 915-187 = 728, cy - 22*8.5 = 340-187 = 153 -->
  <g transform="translate(728, 153) scale(8.5)">
    <!-- Bar 1 (shortest, lightest) -->
    <rect x="5"  y="28" width="6" height="11" rx="2" fill="url(#b1)"/>
    <!-- Bar 2 -->
    <rect x="13" y="21" width="6" height="18" rx="2" fill="url(#b2)"/>
    <!-- Bar 3 -->
    <rect x="21" y="15" width="6" height="24" rx="2" fill="url(#b3)"/>
    <!-- Bar 4 (tallest, indigo tint) -->
    <rect x="29" y="8"  width="6" height="31" rx="2" fill="url(#b4)"/>
    <!-- Glowing trend line -->
    <polyline points="8,27 16,20 24,14 32,7"
      stroke="#a5b4fc" stroke-width="2.2" fill="none"
      stroke-linecap="round" stroke-linejoin="round"
      filter="url(#glow)" opacity="0.95"/>
    <!-- Trend dots -->
    <circle cx="8"  cy="27" r="2.2" fill="#c7d2fe"/>
    <circle cx="16" cy="20" r="2.2" fill="#c7d2fe"/>
    <circle cx="24" cy="14" r="2.2" fill="#c7d2fe"/>
    <circle cx="32" cy="7"  r="2.8" fill="#e0e7ff"/>
  </g>
</svg>
