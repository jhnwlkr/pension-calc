<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="8" height="630" fill="#3b82f6"/>

  <!-- Vertical divider -->
  <line x1="630" y1="40" x2="630" y2="590" stroke="#1e293b" stroke-width="2"/>

  <!-- ── LEFT PANEL ── -->

  <!-- Domain label -->
  <text x="48" y="82" font-family="monospace" font-size="18" fill="#475569" letter-spacing="3">RETIRECALC.UK</text>

  <!-- Main title -->
  <text x="48" y="198" font-family="Georgia, 'Times New Roman', serif" font-size="78" font-weight="bold" fill="#f8fafc">UK</text>
  <text x="48" y="290" font-family="Georgia, 'Times New Roman', serif" font-size="78" font-weight="bold" fill="#f8fafc">Retirement</text>
  <text x="48" y="382" font-family="Georgia, 'Times New Roman', serif" font-size="78" font-weight="bold" fill="#60a5fa">Calculator</text>

  <!-- Feature pills row 1 -->
  <rect x="48" y="424" width="162" height="34" rx="17" fill="#1e3a8a"/>
  <text x="129" y="446" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="15" fill="#93c5fd" text-anchor="middle">Monte Carlo</text>

  <rect x="224" y="424" width="192" height="34" rx="17" fill="#1e3a8a"/>
  <text x="320" y="446" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="15" fill="#93c5fd" text-anchor="middle">Historical Returns</text>

  <!-- Feature pills row 2 -->
  <rect x="48" y="472" width="163" height="34" rx="17" fill="#1e3a8a"/>
  <text x="130" y="494" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="15" fill="#93c5fd" text-anchor="middle">UK Tax Model</text>

  <rect x="225" y="472" width="172" height="34" rx="17" fill="#1e3a8a"/>
  <text x="311" y="494" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="15" fill="#93c5fd" text-anchor="middle">Guyton-Klinger</text>

  <!-- Free badge -->
  <rect x="48" y="552" width="64" height="28" rx="14" fill="#14532d"/>
  <text x="80" y="571" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#86efac" text-anchor="middle">Free</text>

  <!-- Disclaimer -->
  <text x="48" y="604" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="13" fill="#475569">Not financial advice &#183; Not FCA regulated</text>

  <!-- ── RIGHT PANEL: Monte Carlo fan chart ── -->

  <!-- Horizontal grid lines -->
  <line x1="655" y1="100" x2="1160" y2="100" stroke="#1e293b" stroke-width="1"/>
  <line x1="655" y1="200" x2="1160" y2="200" stroke="#1e293b" stroke-width="1"/>
  <line x1="655" y1="300" x2="1160" y2="300" stroke="#1e293b" stroke-width="1"/>
  <line x1="655" y1="400" x2="1160" y2="400" stroke="#1e293b" stroke-width="1"/>
  <line x1="655" y1="500" x2="1160" y2="500" stroke="#1e293b" stroke-width="1"/>

  <!-- 5th–95th percentile band (widest, darkest) -->
  <polygon
    points="655,540 730,500 820,440 910,370 1000,290 1090,210 1160,155
            1160,560 1090,545 1000,530 910,510 820,510 730,530 655,555"
    fill="#1e3a8a" opacity="0.50"/>

  <!-- 10th–90th percentile band -->
  <polygon
    points="655,520 730,480 820,418 910,347 1000,267 1090,189 1160,136
            1160,510 1090,490 1000,476 910,460 820,462 730,488 655,510"
    fill="#2563eb" opacity="0.45"/>

  <!-- 25th–75th percentile band -->
  <polygon
    points="655,495 730,453 820,388 910,316 1000,237 1090,163 1160,114
            1160,450 1090,430 1000,418 910,404 820,412 730,450 655,484"
    fill="#3b82f6" opacity="0.45"/>

  <!-- Median line -->
  <polyline
    points="655,482 730,438 820,370 910,296 1000,215 1090,140 1160,92"
    stroke="#60a5fa" stroke-width="3.5" fill="none"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Median endpoint dot -->
  <circle cx="1160" cy="92" r="7" fill="#60a5fa"/>
  <circle cx="1160" cy="92" r="3.5" fill="#bfdbfe"/>

  <!-- Axis start dot -->
  <circle cx="655" cy="482" r="5" fill="#3b82f6"/>

  <!-- Chart caption -->
  <text x="655" y="590" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="13" fill="#475569">Monte Carlo percentile fan · 1900–2025 historical data</text>
</svg>
