<svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 44 44" fill="none">
  <defs>
    <linearGradient id="bar1g" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#60a5fa"/><stop offset="100%" stop-color="#3b82f6" stop-opacity="0.5"/></linearGradient>
    <linearGradient id="bar2g" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#2563eb" stop-opacity="0.5"/></linearGradient>
    <linearGradient id="bar3g" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#1d4ed8" stop-opacity="0.5"/></linearGradient>
    <linearGradient id="bar4g" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#818cf8"/><stop offset="100%" stop-color="#6366f1" stop-opacity="0.5"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="1.2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <!-- Bars -->
  <rect x="5"  y="28" width="6" height="11" rx="2" fill="url(#bar1g)"/>
  <rect x="13" y="21" width="6" height="18" rx="2" fill="url(#bar2g)"/>
  <rect x="21" y="15" width="6" height="24" rx="2" fill="url(#bar3g)"/>
  <rect x="29" y="8"  width="6" height="31" rx="2" fill="url(#bar4g)"/>
  <!-- Glowing trend line -->
  <polyline points="8,27 16,20 24,14 32,7" stroke="#a5b4fc" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" opacity="0.9"/>
  <!-- Trend dots -->
  <circle cx="8"  cy="27" r="2.2" fill="#c7d2fe"/>
  <circle cx="16" cy="20" r="2.2" fill="#c7d2fe"/>
  <circle cx="24" cy="14" r="2.2" fill="#c7d2fe"/>
  <circle cx="32" cy="7"  r="2.8" fill="#e0e7ff"/>
</svg>
